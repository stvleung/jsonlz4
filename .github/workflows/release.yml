name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation deps (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          name="jsonlz4-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/jsonlz4${{ matrix.ext }}" "dist/${name}/"
          cp README.md LICENSE CHANGELOG.md "dist/${name}/"
          cd dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "${name}.zip" "${name}" >/dev/null
            sha256sum "${name}.zip" > "${name}.zip.sha256"
          else
            tar czf "${name}.tar.gz" "${name}"
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: jsonlz4-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file <(awk -v tag="${tag#v}" '
              /^## \[/ { if (found) exit; if (index($0, "[" tag "]")) found=1; next }
              found
            ' CHANGELOG.md) \
            dist/*.tar.gz dist/*.zip dist/*.sha256 \
            || gh release upload "$tag" dist/*.tar.gz dist/*.zip dist/*.sha256 --clobber
